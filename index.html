<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moree....</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 200%;
  height: 100%;
  display: flex;
  z-index: -1;
  transition: transform 1s ease;
}
#bg img {
  width: 50%;
  height: 100%;
  object-fit: cover;
}

/* PROFILE */
.profile {
  position: relative;
  display: inline-block;
}
.profile img {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin-top: 80px;
  border: 5px solid white;
}

/* ONLINE DOT (FIX NEMPEL) */
.online-dot {
  position: absolute;
  bottom: 10px;
  right: 10px;

  width: 32px;
  height: 32px;

  background: #00ff00;
  border-radius: 50%;
  border: 4px solid white;

  box-shadow: 0 0 15px #00ff00, 0 0 25px #00ff00;

  animation: pulse 1.5s infinite;
}
.online-dot::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,255,0,0.6);
  border-radius: 50%;
  animation: ripple 1.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.2); }
}
@keyframes ripple {
  100% { transform: scale(2); opacity: 0; }
}

/* MEMBER ONLINE */
.online-text {
  color: #00ff00;
  font-size: 18px;
  font-weight: bold;
  margin-top: 10px;
  animation: pulseText 1s infinite;
  text-shadow: 0 0 10px #00ff00, 0 0 25px #00ff00, 0 0 40px #00ff00;
}
@keyframes pulseText {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); opacity: 0.7; }
  100% { transform: scale(1); }
}

/* TITLE */
.title {
  margin-top: 10px;
  font-size: 24px;
  color: white;
  animation: gerak 2s infinite alternate;
}
@keyframes gerak {
  from { transform: translateX(-10px); }
  to { transform: translateX(10px); }
}

/* LINKS */
.links {
  margin-top: 80px;
}
.link-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 85%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 30px;
  background: white;
  text-decoration: none;
  color: black;
}
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.left img {
  width: 30px;
}

/* ANIMASI */
.wa { animation: kiriKanan 2s infinite; }
.telegram { animation: atasBawah 2s infinite; }

@keyframes kiriKanan {
  50% { transform: translateX(8px); }
}
@keyframes atasBawah {
  50% { transform: translateY(8px); }
}

/* USER LIVE */
.live-user {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #00ff00;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.5s;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  color: white;
  font-weight: bold;
  text-shadow: 0 0 10px red;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg">
  <img id="bg1">
  <img id="bg2">
</div>

<!-- PROFILE -->
<div class="profile">
  <img id="profile-img">
  <div class="online-dot"></div>
</div>

<div class="online-text" id="fakeOnline"></div>
<div class="title" id="judul"></div>

<div class="links" id="links"></div>

<div id="liveUser" class="live-user"></div>

<div class="footer">ONLY LOVES 18+</div>

<script src="config.js"></script>
</body>
</html>
